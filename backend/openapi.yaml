openapi: 3.0.3
info:
  title: Stellar Trust Escrow Backend API
  version: 0.2.0
  description: Shared pagination contract plus notification endpoints.
paths:
  /api/escrows:
    get:
      summary: List escrows
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Standardized paginated escrow list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
  /api/escrows/{id}/milestones:
    get:
      summary: List milestones for an escrow
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Standardized paginated milestone list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
  /api/users/{address}/escrows:
    get:
      summary: List escrows for a user
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Standardized paginated user escrow list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
  /api/disputes:
    get:
      summary: List disputes
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Standardized paginated dispute list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
  /api/reputation/leaderboard:
    get:
      summary: List reputation leaderboard entries
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Standardized paginated leaderboard response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
  /api/notifications/events:
    post:
      summary: Queue email notifications for escrow events
      responses:
        '202':
          description: Emails accepted into the queue
  /api/notifications/unsubscribe:
    get:
      summary: Unsubscribe an email recipient
      responses:
        '200':
          description: Recipient unsubscribed
    post:
      summary: API unsubscribe endpoint
      responses:
        '200':
          description: Recipient unsubscribed
  /api/notifications/subscribe:
    post:
      summary: Re-subscribe an email recipient
      responses:
        '200':
          description: Recipient subscribed
  /api/notifications/queue:
    get:
      summary: Inspect queued and delivered notifications
      responses:
        '200':
          description: Queue snapshot
components:
  parameters:
    Page:
      name: page
      in: query
      description: 1-based page number. Values below 1 are normalized to 1.
      schema:
        type: integer
        default: 1
        minimum: 1
    Limit:
      name: limit
      in: query
      description: Page size. Defaults to 20 and is capped at 100.
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
  schemas:
    PaginatedResponse:
      type: object
      required:
        - data
        - page
        - limit
        - total
        - totalPages
        - hasNextPage
        - hasPreviousPage
      properties:
        data:
          type: array
          items: {}
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer
        hasNextPage:
          type: boolean
        hasPreviousPage:
          type: boolean
